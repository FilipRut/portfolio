    - heading "About me" [level=2] [ref=e189]
    - paragraph [ref=e190]: I'm Filip — a Lead AI UX/UI Designer and Webflow developer based in Warsaw. I help brands cut through corporate chaos with sharp design systems, rapid prototyping, and AI-augmented workflows that actually ship.
    - paragraph [ref=e191]: Over the past years I've led design for Orange, HP, Lidl, Enea and others — building everything from enterprise dashboards to consumer apps and self-checkout kiosks.
