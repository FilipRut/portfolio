    - generic [ref=e200]:
      - generic [ref=e201] [cursor=pointer]:
        - generic [ref=e202]: "01"
        - generic [ref=e203]:
          - heading "Listen before prompting" [level=3] [ref=e204]
          - paragraph [ref=e205]: Every project starts with the same question — what problem are we actually solving? AI doesn't change that. It just makes the cost of being wrong lower and the speed of finding right higher.
      - generic [ref=e206] [cursor=pointer]:
        - generic [ref=e207]: "02"
        - generic [ref=e208]:
          - heading "Think in systems, not screens" [level=3] [ref=e209]
          - paragraph [ref=e210]: I map the full picture first — user flows, data architecture, edge cases. AI accelerates exploration of variants I wouldn't have time to sketch by hand. More paths tested, stronger decisions.
      - generic [ref=e211] [cursor=pointer]:
        - generic [ref=e212]: "03"
        - generic [ref=e213]:
          - heading "Prototype at the speed of thought" [level=3] [ref=e214]
          - paragraph [ref=e215]: From concept to interactive prototype in hours, not weeks. AI handles the repetitive scaffolding so I stay focused on the craft — the micro-interactions, the typography, the feeling.
      - generic [ref=e216] [cursor=pointer]:
        - generic [ref=e217]: "04"
        - generic [ref=e218]:
          - heading "Validate with real signals" [level=3] [ref=e219]
          - paragraph [ref=e220]: Beautiful doesn't mean useful. I test early, test often, and let data guide iteration. AI helps synthesize feedback faster — but the judgment call is always human.
      - generic [ref=e221] [cursor=pointer]:
        - generic [ref=e222]: "05"
        - generic [ref=e223]:
          - heading "Ship and keep shaping" [level=3] [ref=e224]
          - paragraph [ref=e225]: Design doesn't end at handoff. I stay close to code, close to users, close to the product. The best work evolves after launch — when reality meets intention.
    - paragraph [ref=e227]: AI is my multiplier, not my replacement. It lets me spend less time on production and more time on the decisions that actually matter.